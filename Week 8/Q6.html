<!DOCTYPE html>
<html>
<head>
    <title>Digital Clock</title>
    <style>
        body{
            text-align:center;
            font-family:Arial;
        }
        #clock{
            font-size:40px;
            font-weight:bold;
            color:blue;
        }
    </style>
</head>
<body>

<h2>Digital Clock</h2>
<div id="clock"></div>

<script>
function showTime() {
    var date = new Date();
    
    var h = date.getHours();
    var m = date.getMinutes();
    var s = date.getSeconds();

    if(h < 10) h = "0" + h;
    if(m < 10) m = "0" + m;
    if(s < 10) s = "0" + s;

    var time = h + ":" + m + ":" + s;

    document.getElementById("clock").innerHTML = time;
}

setInterval(showTime, 1000);

showTime();
</script>

</body>
</html>
